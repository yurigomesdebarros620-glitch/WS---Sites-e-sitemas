    function useInView(threshold = 0.18) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const node = ref.current;
        if (!node) return;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) setVisible(true);
        }, { threshold });
        observer.observe(node);
        return () => observer.disconnect();
      }, [threshold]);

      return [ref, visible];
    }

    function Reveal({ children, delay = 0, className = "" }) {
      const [ref, visible] = useInView();
      return (
        <div
          ref={ref}
          className={`reveal ${visible ? "reveal--show" : ""} ${className}`}
          style={{ transitionDelay: `${delay}s` }}
        >
          {children}
        </div>
      );
    }

    function Contato() {
      const [form, setForm] = useState({ nome: "", email: "", empresa: "", mensagem: "" });

      const canSubmit = form.nome.trim() && form.email.trim() && form.mensagem.trim();
      const handle = (field) => (event) => setForm((prev) => ({ ...prev, [field]: event.target.value }));

      function submit() {
        if (!canSubmit) return;
        const subject = encodeURIComponent(`Orçamento - ${form.nome}${form.empresa ? " | " + form.empresa : ""}`);
        const body = encodeURIComponent(`Nome: ${form.nome}\nE-mail: ${form.email}\nEmpresa: ${form.empresa || "Não informado"}\n\nMensagem:\n${form.mensagem}`);
        window.open(`mailto:WS.sistemasesites@gmail.com?subject=${subject}&body=${body}`, "_blank");
        setSent(true);
        setTimeout(() => setSent(false), 3800);
      }

      return (

                <a href="https://wa.me/5500000000000" target="_blank"><span>💬</span><div><b>WhatsApp</b><small>Fale pelo WhatsApp</small></div></a>
              </div>

            <Reveal delay={0.14}>
              <div className="form-card">
                <h3>Enviar mensagem</h3>
                <div className="form-row">
                  <label>Nome *<input value={form.nome} onChange={handle("nome")} placeholder="Seu nome" /></label>
                  <label>E-mail *<input value={form.email} onChange={handle("email")} placeholder="seu@email.com" /></label>
                </div>
                <label>Empresa<input value={form.empresa} onChange={handle("empresa")} placeholder="Nome da empresa" /></label>
                <label>Mensagem *<textarea value={form.mensagem} onChange={handle("mensagem")} placeholder="Descreva seu projeto..." rows="5" /></label>

              </div>
            </Reveal>
          </div>
        </section>
      );

            .hero p { color: rgba(255,255,255,.68); font-size: clamp(1rem, 1.4vw, 1.18rem); line-height: 1.75; max-width: 590px; margin: 28px 0 36px; }
            .hero__actions { display: flex; flex-wrap: wrap; gap: 14px; }
            .btn { border: 0; padding: 15px 26px; border-radius: 16px; font-weight: 800; font-size: 15px; transition: transform .22s ease, box-shadow .22s ease, opacity .22s ease; }
            .btn:hover { transform: translateY(-3px); }
            .btn--primary { color: #fff; background: linear-gradient(135deg, var(--blue), var(--orange)); box-shadow: 0 18px 44px rgba(20,99,255,.28), 0 12px 34px rgba(255,122,26,.22); }
            .btn--ghost { color: #fff; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); backdrop-filter: blur(16px); }
            .hero__metrics { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 44px; }
            .hero__metrics div { min-width: 132px; padding: 18px; border-radius: 22px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); backdrop-filter: blur(16px); }
            .hero__metrics strong { display: block; color: #fff; font-size: 28px; line-height: 1; }
            .hero__metrics span { color: rgba(255,255,255,.55); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; display: block; }
            .hero-card-wrap { justify-self: end; width: 100%; }
            .hero-card { position: relative; width: min(440px, 100%); margin-left: auto; padding: 14px; border-radius: 34px; background: linear-gradient(145deg, rgba(255,255,255,.22), rgba(255,255,255,.06)); border: 1px solid rgba(255,255,255,.2); box-shadow: 0 40px 110px rgba(0,0,0,.34); backdrop-filter: blur(20px); transform: rotate(2deg); animation: cardFloat 5s ease-in-out infinite; }
            .hero-card__top { height: 48px; display: flex; align-items: center; gap: 8px; padding-left: 12px; }
            .hero-card__top span { width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,.28); }
            .hero-card__top span:nth-child(1) { background: var(--orange); }
            .hero-card__top span:nth-child(2) { background: var(--blue-soft); }
            .hero-card__screen { padding: 30px; min-height: 420px; border-radius: 24px; color: #fff; background: radial-gradient(circle at 20% 20%, rgba(255,122,26,.22), transparent 30%), radial-gradient(circle at 90% 0%, rgba(20,99,255,.4), transparent 38%), linear-gradient(160deg, rgba(5,20,47,.98), rgba(7,26,61,.92)); overflow: hidden; position: relative; }
            .hero-card__screen::after { content: ''; position: absolute; width: 220px; height: 220px; border: 38px solid rgba(255,255,255,.06); border-radius: 50%; right: -80px; bottom: -80px; }
            .screen-pill { display: inline-flex; padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 800; color: var(--orange-soft); background: rgba(255,122,26,.12); border: 1px solid rgba(255,122,26,.26); }
            .screen-title { font-family: 'Space Grotesk', sans-serif; font-size: 34px; line-height: 1; letter-spacing: -.04em; max-width: 280px; margin: 60px 0 30px; }
            .screen-bars { display: grid; gap: 12px; margin-bottom: 34px; }
            .screen-bars span { height: 11px; border-radius: 999px; background: linear-gradient(90deg, var(--blue), var(--orange)); animation: bar 2.8s ease-in-out infinite alternate; }
            .screen-bars span:nth-child(2) { animation-delay: .3s; opacity: .75; }
            .screen-bars span:nth-child(3) { animation-delay: .6s; opacity: .55; }
            .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; position: relative; z-index: 1; }
            .mini-grid div { padding: 14px 10px; border-radius: 16px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); }
            .mini-grid b { display: block; color: var(--orange-soft); margin-bottom: 8px; }
            .mini-grid span { color: rgba(255,255,255,.7); font-size: 11px; font-weight: 700; }
            .hero-card__badge { position: absolute; right: -16px; bottom: 54px; color: var(--ink); background: #fff; padding: 14px 18px; border-radius: 18px; font-weight: 900; box-shadow: var(--shadow); }
            .section { padding: 118px 0; position: relative; }
            .section--soft { background: linear-gradient(180deg, #fff, #EFF4FF); }
            .section--dark { color: #fff; background: radial-gradient(circle at 10% 0%, rgba(20,99,255,.36), transparent 32%), radial-gradient(circle at 90% 20%, rgba(255,122,26,.2), transparent 30%), #06142F; }
            .section-title { text-align: center; max-width: 720px; margin: 0 auto 62px; }
            .kicker, .side-label { display: inline-flex; align-items: center; gap: 9px; color: var(--blue); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: .16em; margin-bottom: 16px; }

            .section--dark .section-title h2 { color: #fff; }
            .section-title p, .lead { color: var(--muted); line-height: 1.75; font-size: 1.05rem; margin-top: 18px; }
            .section--dark .section-title p { color: rgba(255,255,255,.65); }
            .about { background: #fff; }

            .about p:not(.lead) { color: var(--muted); line-height: 1.75; margin-top: 14px; }
            .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
            .feature-card, .service-card, .project-card, .testimonial-card, .form-card { background: rgba(255,255,255,.86); border: 1px solid rgba(20,99,255,.1); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(5,20,47,.07); transition: .28s ease; }
            .feature-card { padding: 26px; min-height: 210px; }

            .feature-card span { display: grid; place-items: center; width: 48px; height: 48px; border-radius: 16px; margin-bottom: 22px; background: linear-gradient(135deg, rgba(20,99,255,.1), rgba(255,122,26,.16)); font-size: 22px; }
            .feature-card h3, .service-card h3, .timeline-item h3, .project-card h3 { font-size: 1.14rem; color: var(--ink); margin-bottom: 10px; }
            .feature-card p, .service-card p, .project-card p, .timeline-item p, .testimonial-card p { color: var(--muted); line-height: 1.68; font-size: .95rem; }
            .service-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .service-card { padding: 30px 24px; min-height: 292px; position: relative; overflow: hidden; }
            .service-card::after { content: ''; position: absolute; width: 140px; height: 140px; border-radius: 50%; background: rgba(255,122,26,.08); right: -70px; bottom: -70px; transition: .3s ease; }
            .service-card:hover::after { transform: scale(1.8); }
            .service-card__icon { width: 58px; height: 58px; border-radius: 20px; display: grid; place-items: center; font-size: 26px; background: var(--ink); margin-bottom: 24px; box-shadow: inset 0 0 0 2px rgba(255,255,255,.08); }
            .service-card span { display: inline-block; margin-top: 22px; color: var(--blue); font-weight: 900; font-size: 13px; }
            .portfolio { background: #fff; overflow: hidden; }

            .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
            .project-card { overflow: hidden; background: #fff; }
            .project-card:hover { transform: translateY(-9px) rotate(-.5deg); box-shadow: var(--shadow); }
            .project-card__visual { height: 210px; position: relative; display: grid; place-items: center; overflow: hidden; background: linear-gradient(135deg, rgba(20,99,255,.14), rgba(255,122,26,.18)); }
            .project-card:nth-child(even) .project-card__visual { background: linear-gradient(135deg, rgba(255,122,26,.18), rgba(20,99,255,.14)); }
            .project-card__number { position: absolute; left: 22px; top: 18px; color: rgba(5,20,47,.23); font-family: 'Space Grotesk', sans-serif; font-size: 54px; font-weight: 700; }
            .project-card__shape { width: 120px; height: 120px; border-radius: 36px; background: linear-gradient(135deg, var(--blue), var(--orange)); box-shadow: 0 22px 70px rgba(20,99,255,.25); transform: rotate(18deg); transition: .35s ease; }
            .project-card:hover .project-card__shape { transform: rotate(45deg) scale(1.08); border-radius: 50%; }
            .project-card__body { padding: 24px; }
            .project-card__body > span { display: inline-flex; color: var(--orange); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
            .timeline { position: relative; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .timeline::before { content: ''; position: absolute; left: 0; right: 0; top: 32px; height: 2px; background: linear-gradient(90deg, var(--blue), var(--orange)); opacity: .45; }
            .timeline-item { position: relative; z-index: 1; padding: 30px 24px; border-radius: 26px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); backdrop-filter: blur(16px); min-height: 230px; }
            .timeline-item span { display: grid; place-items: center; width: 64px; height: 64px; border-radius: 20px; margin-bottom: 26px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 22px; background: linear-gradient(135deg, var(--blue), var(--orange)); box-shadow: 0 18px 40px rgba(0,0,0,.22); }
            .timeline-item h3 { color: #fff; }
            .timeline-item p { color: rgba(255,255,255,.66); }
            .testimonials { background: linear-gradient(180deg, #fff, #F6F8FF); }
            .testimonial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
            .testimonial-card { padding: 30px; }
            .stars { color: var(--orange); letter-spacing: 2px; margin-bottom: 18px; }
            .testimonial-card > p { font-size: 1rem; margin-bottom: 26px; font-style: italic; }
            .testimonial-card strong { display: block; color: var(--ink); }
            .testimonial-card span { color: var(--muted); font-size: 13px; }
            .contact { background: radial-gradient(circle at 95% 20%, rgba(255,122,26,.12), transparent 30%), #fff; }
            .contact-list { display: grid; gap: 14px; margin-top: 34px; }
            .contact-list a { display: flex; align-items: center; gap: 14px; text-decoration: none; padding: 18px; border-radius: 22px; background: #fff; border: 1px solid rgba(20,99,255,.11); box-shadow: 0 16px 50px rgba(5,20,47,.06); transition: .25s ease; }
            .contact-list a:hover { transform: translateX(8px); border-color: rgba(255,122,26,.35); }
            .contact-list span { width: 48px; height: 48px; border-radius: 16px; display: grid; place-items: center; background: linear-gradient(135deg, rgba(20,99,255,.1), rgba(255,122,26,.14)); }
            .contact-list small { display: block; color: var(--muted); margin-top: 3px; }
            .form-card { padding: 34px; background: rgba(255,255,255,.92); }
            .form-card h3 { font-size: 1.4rem; margin-bottom: 22px; }
            .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
            label { display: grid; gap: 8px; color: var(--ink); font-size: 13px; font-weight: 900; margin-bottom: 14px; }
            input, textarea { width: 100%; border: 1px solid rgba(20,99,255,.14); background: #F8FAFF; border-radius: 16px; padding: 15px 16px; outline: none; color: var(--ink); font-size: 14px; transition: .2s ease; resize: vertical; }
            input:focus, textarea:focus { border-color: var(--orange); background: #fff; box-shadow: 0 0 0 4px rgba(255,122,26,.1); }
            .form-button { width: 100%; margin-top: 8px; }
            .form-button:disabled { opacity: .48; cursor: not-allowed; transform: none; }
            .cta { padding: 92px 0; background: #06142F; }
            .cta__box { text-align: center; color: #fff; padding: clamp(34px, 6vw, 70px); border-radius: 36px; background: radial-gradient(circle at 16% 16%, rgba(20,99,255,.38), transparent 34%), radial-gradient(circle at 86% 20%, rgba(255,122,26,.28), transparent 34%), linear-gradient(135deg, rgba(255,255,255,.09), rgba(255,255,255,.04)); border: 1px solid rgba(255,255,255,.13); box-shadow: 0 34px 100px rgba(0,0,0,.24); }
            .cta__box > span { font-size: 44px; }
            .cta__box h2 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2rem, 4vw, 3.4rem); line-height: 1.03; letter-spacing: -.055em; max-width: 760px; margin: 18px auto; }
            .cta__box p { color: rgba(255,255,255,.66); max-width: 600px; margin: 0 auto 30px; line-height: 1.7; }
            .footer { background: #030B1C; color: rgba(255,255,255,.62); padding: 70px 0 30px; }
            .footer__grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 42px; padding-bottom: 42px; }
            .footer-brand { color: #fff; font-weight: 900; display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
            .footer-brand span { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(135deg, var(--blue), var(--orange)); }
            .footer p { max-width: 350px; line-height: 1.7; }
            .footer b { display: block; color: #fff; margin-bottom: 16px; }
            .footer a { display: block; text-decoration: none; margin-bottom: 10px; transition: .2s ease; }
            .footer a:hover { color: var(--orange-soft); transform: translateX(4px); }
            .footer__bottom { border-top: 1px solid rgba(255,255,255,.08); padding-top: 24px; display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap; font-size: 13px; }
            .reveal { opacity: 0; transform: translateY(34px); transition: opacity .75s ease, transform .75s cubic-bezier(.2,.8,.2,1); }
            .reveal--show { opacity: 1; transform: translateY(0); }
            @keyframes rotate { to { transform: rotate(360deg); } }
            @keyframes pulse { from { transform: scale(.9); opacity: .38; } to { transform: scale(1.06); opacity: .62; } }
            @keyframes drift { to { transform: translate3d(-70px, -70px, 0); } }
            @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
            @keyframes cardFloat { 0%,100% { transform: rotate(2deg) translateY(0); } 50% { transform: rotate(-1deg) translateY(-12px); } }
            @keyframes bar { from { transform: scaleX(.72); transform-origin: left; } to { transform: scaleX(1); transform-origin: left; } }
            @media (max-width: 980px) {
              .menu-toggle { display: grid; }
              .navbar__links { position: absolute; top: 80px; left: 20px; right: 20px; display: none; flex-direction: column; align-items: stretch; padding: 12px; border-radius: 26px; background: rgba(255,255,255,.96); box-shadow: var(--shadow); border: 1px solid rgba(20,99,255,.12); }
              .navbar__links--open { display: flex; }
              .navbar__links button, .navbar--scrolled .navbar__links button { color: var(--ink); text-align: left; }
              .navbar__links .nav-cta { text-align: center; color: #fff !important; }
              .hero__inner, .about__grid, .contact__grid { grid-template-columns: 1fr; gap: 44px; }
              .hero-card-wrap { justify-self: start; }
              .service-grid, .portfolio-grid, .timeline, .testimonial-grid, .footer__grid { grid-template-columns: repeat(2, 1fr); }
              .timeline::before { display: none; }
            }
            @media (max-width: 640px) {
              .container, .hero__inner, .navbar__inner { width: calc(100% - 28px); }
              .navbar { top: 12px; }
              .brand__text { display: none; }
              .hero { padding-top: 118px; }
              .hero h1 { font-size: clamp(2.5rem, 15vw, 4.2rem); }
              .hero-card { transform: none; animation: none; }
              .hero-card__screen { min-height: 360px; padding: 24px; }
              .screen-title { font-size: 28px; }
              .mini-grid, .feature-grid, .service-grid, .portfolio-grid, .timeline, .testimonial-grid, .footer__grid, .form-row { grid-template-columns: 1fr; }
              .section { padding: 82px 0; }
              .footer__bottom { flex-direction: column; }
            }
          `}</style>
          <Navbar scrolled={scrolled} />
          <Hero />
          <Sobre />
          <Servicos />
          <Portfolio />
          <Processo />
          <Depoimentos />
          <Contato />
          <CTA />
          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
